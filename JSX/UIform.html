<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
     <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
     <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="r"></div>
    <script type="text/babel">
         var ar=[
            {
            Firstname:"Jyothsnavi",
            Lastname:"Boddu",
            Age:18
           },  
            {
            Firstname:"Yagnesh",
            Lastname:"Boddu",
            Age:16
           },
            {
            Firstname:"Praveena",
            Lastname:"Gogula",
            Age:12
           }
  
  

    ]
    function addtodo()
    {
        var n=document.getElementById("name").value
        var ln=document.getElementById("lname").value
        var a=document.getElementById("age").value
        ar.push({Firstname:n,Lastname:ln,Age:a})
        console.log(ar)
        UI()
    }
    function deletetodo(i)
    {
        ar.splice(i,1)
        UI()
    }
    function UI()
        {
            var js=<div>
                <input type="text" id="name" placeholder="Enter your firstname" />
                <br/>
                <input type="text" id="lname" placeholder="Enter your laststname"/>
                <br/>
                 <input type="text" id="age" placeholder="Enter your age"/>
                 <br/>
                 <button onClick={()=>{addtodo(event)}}>AddData</button>
                <table border="3">
                        <thead>
                                <tr>
                                    <th>FirstName</th>
                                    <th>LastName</th>
                                    <th>Age</th>
                                
                                </tr>
                            </thead>
                            <tbody>
                                {
                                    ar.map((s,i)=>
                                    {
                                        return <tr>
                                                <td>{s.Firstname}</td>
                                                <td>{s.Lastname}</td>
                                                <td>{s.Age}</td>
                                                <td><button onClick={()=>{deletetodo(i)}}>Delete</button></td>
                                            </tr>
                                    })
                                }
                            </tbody>
                    </table>
                 </div>   
                 ReactDOM.render(js,document.getElementById("r"))
        }
        UI()

    </script>
</body>
</html>
